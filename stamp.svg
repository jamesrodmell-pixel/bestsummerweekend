<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Best Summer Weekend Cookbook — Good Food, Good Company, Great Weekends">
  <defs>
    <path id="arcTop" d="M 60,200 A 140,140 0 0 1 340,200" fill="none"/>
    <path id="arcBot" d="M 64,200 A 136,136 0 0 0 336,200" fill="none"/>
    <style>
      .navy{fill:#1d3a5f}.ember{fill:#d9772f}
      .t{font-family:Georgia,'Times New Roman',serif;font-weight:700;letter-spacing:2px}
    </style>
  </defs>

  <!-- rings -->
  <circle cx="200" cy="200" r="194" fill="#faf6ee"/>
  <circle cx="200" cy="200" r="190" fill="none" stroke="#1d3a5f" stroke-width="6"/>
  <circle cx="200" cy="200" r="176" fill="none" stroke="#d9772f" stroke-width="2.5"/>
  <circle cx="200" cy="200" r="150" fill="none" stroke="#1d3a5f" stroke-width="1.5" stroke-dasharray="1 5" stroke-linecap="round"/>

  <!-- curved text -->
  <text class="t navy" font-size="30">
    <textPath href="#arcTop" startOffset="50%" text-anchor="middle">BEST SUMMER WEEKEND</textPath>
  </text>
  <text class="t navy" font-size="15">
    <textPath href="#arcBot" startOffset="50%" text-anchor="middle">GOOD FOOD · GOOD COMPANY · GREAT WEEKENDS</textPath>
  </text>

  <!-- side stars -->
  <g class="ember">
    <path d="M70 200 l3 -9 3 9 9 3 -9 3 -3 9 -3 -9 -9 -3 z"/>
    <path d="M330 200 l3 -9 3 9 9 3 -9 3 -3 9 -3 -9 -9 -3 z"/>
  </g>

  <!-- center emblem: sun over lake with pines -->
  <g>
    <text x="200" y="150" text-anchor="middle" class="t ember" font-size="44" letter-spacing="1">COOKBOOK</text>
    <!-- water disc -->
    <clipPath id="disc"><circle cx="200" cy="232" r="64"/></clipPath>
    <g clip-path="url(#disc)">
      <rect x="136" y="168" width="128" height="128" fill="#fdf3e2"/>
      <!-- sun -->
      <circle cx="200" cy="226" r="20" class="ember"/>
      <!-- horizon water -->
      <rect x="136" y="246" width="128" height="50" fill="#e9f0f4"/>
      <path d="M136 252 q16 -6 32 0 t32 0 t32 0 t32 0" fill="none" stroke="#1d3a5f" stroke-width="2" opacity=".55"/>
      <path d="M136 264 q16 -6 32 0 t32 0 t32 0 t32 0" fill="none" stroke="#1d3a5f" stroke-width="2" opacity=".4"/>
      <path d="M136 276 q16 -6 32 0 t32 0 t32 0 t32 0" fill="none" stroke="#1d3a5f" stroke-width="2" opacity=".28"/>
      <!-- pines -->
      <g class="navy">
        <path d="M150 246 l8 -22 8 22 z"/><path d="M152 238 l6 -14 6 14 z" fill="#1d3a5f"/>
        <path d="M236 246 l9 -26 9 26 z"/><path d="M250 246 l7 -18 7 18 z"/>
      </g>
      <!-- birds -->
      <path d="M180 206 q4 -4 8 0 q4 -4 8 0" fill="none" stroke="#1d3a5f" stroke-width="1.6"/>
      <path d="M206 200 q3 -3 6 0 q3 -3 6 0" fill="none" stroke="#1d3a5f" stroke-width="1.4"/>
    </g>
    <circle cx="200" cy="232" r="64" fill="none" stroke="#1d3a5f" stroke-width="2.5"/>
  </g>
</svg>
